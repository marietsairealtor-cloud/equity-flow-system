name: retention-lifecycle-scheduler

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch: {}

jobs:
  run-retention-lifecycle:
    name: retention-lifecycle
    runs-on: ubuntu-latest
    steps:
      - name: Invoke retention-lifecycle Edge Function
        run: |
          RESPONSE=$(curl -s -o response.json -w "%{http_code}" \
            -X POST \
            -H "x-retention-secret: ${{ secrets.RETENTION_LIFECYCLE_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.SUPABASE_URL }}/functions/v1/retention-lifecycle")
          echo "HTTP status: $RESPONSE"
          echo "Response body:"
          cat response.json
          if [ "$RESPONSE" != "200" ]; then
            echo "FAIL: retention-lifecycle returned HTTP $RESPONSE"
            exit 1
          fi
          OK=$(cat response.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('ok',''))")
          if [ "$OK" != "True" ]; then
            echo "FAIL: retention-lifecycle returned ok!=true"
            exit 1
          fi
          echo "PASS: retention-lifecycle completed successfully"
