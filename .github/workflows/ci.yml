  proof-manifest:
    name: proof-manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: enforce LF
        shell: bash
        run: |
          git config --global core.autocrlf false
      - name: proof-manifest
        shell: pwsh
        run: |
