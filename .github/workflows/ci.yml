        run: ./scripts/ci_rpc_mapping_contract.ps1

  cloud-migration-parity:
    name: cloud-migration-parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL 16 client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: cloud-migration-parity
        shell: pwsh
        env:
          SUPABASE_DB_URL: ${{ secrets.DATABASE_URL }}
        run: ./scripts/cloud_migration_parity_check.ps1
  cloud-schema-drift:
    name: cloud-schema-drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL 17 client
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
      - name: cloud-schema-drift
        shell: pwsh
        env:
          SUPABASE_DB_URL: ${{ secrets.DATABASE_URL }}
          PATH: /usr/lib/postgresql/17/bin:${{ env.PATH }}
        run: |
          pg_dump --version
          ./scripts/cloud_schema_drift_check.ps1
  ci-db-smoke:
    name: ci-db-smoke
    needs: [changes, lane-enforcement]
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        shell: bash
        run: |
          supabase start
          echo "--- supabase status ---"
          supabase status

      - name: Smoke query — DB reachable
        shell: bash
        run: |
          PGPASSWORD=postgres psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -c "SELECT 1 AS db_reachable;"

      - name: Capture versions for proof
        shell: pwsh
        run: |
          Write-Host "=== ci-db-smoke ==="
          Write-Host ("RUNNER_OS=" + $env:RUNNER_OS)
          $nodeV = (node --version)
          Write-Host ("NODE_VERSION=" + $nodeV)
          $supaV = (supabase --version 2>&1)
          Write-Host ("SUPABASE_CLI_VERSION=" + $supaV)
          Write-Host ("PSQL_CHECK=SELECT 1 returned successfully")
          Write-Host "STATUS: PASS"

  clean-room-replay:
    name: clean-room-replay
    needs: [changes, lane-enforcement]
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        shell: bash
        run: supabase start

      - name: Clean-room replay — reset and replay all migrations
        shell: bash
        run: |
          echo "=== clean-room-replay ==="
          echo "Resetting database and replaying all migrations..."
          supabase db reset
          echo "=== Migration list ==="
          ls -1 supabase/migrations/
          echo "clean-room-replay completed successfully"

  schema-drift:
    name: schema-drift
    needs: [changes, lane-enforcement]
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start Supabase and replay migrations
        shell: bash
        run: |
          supabase start
          supabase db reset
      - name: Regenerate schema from live CI DB
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/gen_schema.ps1 -OutPath generated/schema_ci.sql
      - name: Diff CI schema against committed schema
        shell: pwsh
        run: |
