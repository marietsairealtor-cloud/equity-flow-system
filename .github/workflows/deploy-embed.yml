# Deploys apps/embed/ (static intake HTML) to GitHub Pages without using /docs.
# Repository Settings → Pages → Build and deployment → Source: GitHub Actions.
name: Deploy embed to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'apps/embed/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-embed
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/embed

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
